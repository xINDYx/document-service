server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/document_db
    username: docuser
    password: docpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

document:
  workers:
    batch-size: 100
    submit-interval-ms: 10000
    approve-interval-ms: 15000

logging:
  level:
    com.itq.document: INFO
    org.springframework: WARN
