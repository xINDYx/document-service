version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: document-db
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: docuser
      POSTGRES_PASSWORD: docpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuser -d document_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
